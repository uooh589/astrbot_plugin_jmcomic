# JMComic Plugin Configuration

download_dir: /AstrBot/data/jmcomic/  # 下载目录（需 NapCat 可访问）
allow_groups: []                       # 群白名单，空=不限制
allow_users: []                        # 用户白名单，空=不限制
max_concurrent: 1                      # 同时下载数
auto_clean: true                       # 完成后自动清理临时文件
failed_placeholder: ""                 # 下载失败时填补的占位图（默认插件目录内）
command_prefix: "/"                    # 命令前缀

# JMComic 客户端高级配置
jmcomic_config:
  threading_image: 10
  threading_photo: 2
